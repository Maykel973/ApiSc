[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "mesa",
  "expat",
  "libxcb",
  "alsaLib",
  "pango",
  "cairo",
  "glib",
  "gdk-pixbuf",
  "gtk3",
  "at-spi2-atk",
  "at-spi2-core"
]

[phases.install]
cmds = ["npm install", "npx playwright install chromium"]

[start]
cmd = "node server.js"
