<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scraper Pelisjuanita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 16px 24px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 20px; color: #e50914; }

    .search-bar {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      max-width: 700px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .search-bar input:focus { border-color: #e50914; }

    .search-bar button {
      padding: 10px 20px;
      background: #e50914;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .search-bar button:hover { background: #c40812; }

    #status {
      padding: 0 24px 10px;
      font-size: 13px;
      color: #888;
      min-height: 20px;
    }

    /* RESULTADOS DE BÚSQUEDA */
    #results {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 0 24px 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      width: 150px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      overflow: hidden;
    }

    .card:hover { transform: scale(1.04); border-color: #e50914; }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .card-info { padding: 8px; }
    .card-info h3 { font-size: 12px; line-height: 1.3; color: #eee; }
    .card-info span { font-size: 11px; color: #888; }

    /* PANEL DE DETALLE */
    #detail {
      display: none;
      padding: 0 24px 24px;
    }

    .detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .detail-header img {
      width: 140px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .detail-info h2 { font-size: 22px; margin-bottom: 8px; color: #fff; }
    .detail-info p  { font-size: 13px; color: #aaa; line-height: 1.6; max-width: 600px; }

    #btn-back {
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    #btn-back:hover { background: #444; }

    h3.section-title {
      font-size: 15px;
      color: #e50914;
      margin: 20px 0 10px;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
    }

    /* SERVIDORES */
    #servers {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 600px;
    }

    .server-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.2s, background 0.2s;
    }

    .server-btn:hover { border-color: #e50914; background: #2a2a2a; }

    .server-btn .idioma {
      margin-left: auto;
      font-size: 11px;
      background: #333;
      padding: 2px 8px;
      border-radius: 4px;
      color: #aaa;
    }

    /* EPISODIOS */
    #episodes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 700px;
    }

    .ep-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .ep-item:hover { border-color: #e50914; }
    .ep-item.active { border-color: #e50914; background: #2a1a1a; }

    .ep-item h4 { font-size: 13px; color: #eee; margin-bottom: 4px; }
    .ep-item p  { font-size: 11px; color: #888; line-height: 1.4; }
    .ep-item .ep-info { font-size: 11px; color: #666; margin-top: 4px; }

    /* PLAYER */
    #player-wrap {
      display: none;
      margin-top: 16px;
    }

    #player-wrap iframe {
      width: 100%;
      max-width: 900px;
      height: 506px;
      border: none;
      border-radius: 8px;
      background: #000;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #444;
      border-top-color: #e50914;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🎬 Pelisjuanita Scraper</h1>
</header>

<!-- CONFIGURACIÓN: cambiá esta URL por la de tu Vercel -->
<script>
  const API = "https://TU-PROYECTO.vercel.app";
</script>

<div class="search-bar">
  <input type="text" id="q" placeholder="Buscar película o serie..." />
  <button onclick="doSearch()">Buscar</button>
</div>

<div id="status"></div>
<div id="results"></div>
<div id="detail">
  <button id="btn-back" onclick="goBack()">← Volver</button>
  <div class="detail-header">
    <img id="d-poster" src="" alt="poster">
    <div class="detail-info">
      <h2 id="d-title"></h2>
      <p id="d-desc"></p>
    </div>
  </div>

  <h3 class="section-title">▶ Servidores</h3>
  <div id="servers"></div>

  <div id="player-wrap">
    <iframe id="player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <h3 class="section-title" id="ep-title" style="display:none">📋 Episodios</h3>
  <div id="episodes"></div>
</div>

<script>
  const input = document.getElementById("q");
  input.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

  function setStatus(msg, loading = false) {
    document.getElementById("status").innerHTML =
      loading ? `<span class="loader"></span>${msg}` : msg;
  }

  async function doSearch() {
    const q = input.value.trim();
    if (!q) return;

    setStatus("Buscando...", true);
    document.getElementById("results").innerHTML = "";
    document.getElementById("detail").style.display = "none";

    try {
      const data = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`).then(r => r.json());

      if (data.error) return setStatus("Error: " + data.error);
      if (!data.length) return setStatus("Sin resultados.");

      setStatus(`${data.length} resultado(s)`);
      const container = document.getElementById("results");

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${item.img || ''}" onerror="this.style.display='none'" alt="${item.title}">
          <div class="card-info">
            <h3>${item.title}</h3>
            <span>${item.year} • ${item.type}</span>
          </div>`;
        card.onclick = () => loadDetail(item.link, item.title);
        container.appendChild(card);
      });
    } catch (e) {
      setStatus("Error de conexión: " + e.message);
    }
  }

  async function loadDetail(url, title) {
    setStatus("Cargando servidores...", true);
    document.getElementById("results").style.display = "none";
    document.getElementById("detail").style.display = "none";

    try {
      const data = await fetch(`${API}/api/servers?url=${encodeURIComponent(url)}`).then(r => r.json());

      if (data.error) return setStatus("Error: " + data.error);

      setStatus("");
      document.getElementById("d-title").textContent  = data.title || title;
      document.getElementById("d-desc").textContent   = data.desc  || "";
      document.getElementById("d-poster").src         = data.poster || "";
      document.getElementById("detail").style.display = "block";

      // Servidores
      const srv = document.getElementById("servers");
      srv.innerHTML = "";
      document.getElementById("player-wrap").style.display = "none";

      if (!data.servers.length) {
        srv.innerHTML = "<p style='color:#888'>No se encontraron servidores.</p>";
      } else {
        data.servers.forEach((s, i) => {
          const btn = document.createElement("div");
          btn.className = "server-btn";
          btn.innerHTML = `<span>▶ ${s.name || "Servidor " + (i+1)}</span><span class="idioma">${s.idioma}</span>`;
          btn.onclick = () => loadPlayer(s.url);
          srv.appendChild(btn);
        });
      }

      // Episodios
      const epWrap  = document.getElementById("ep-title");
      const epList  = document.getElementById("episodes");
      epList.innerHTML = "";

      if (data.episodes && data.episodes.length) {
        epWrap.style.display = "block";
        data.episodes.forEach(ep => {
          const div = document.createElement("div");
          div.className = "ep-item";
          div.innerHTML = `
            <div>
              <h4>${ep.title}</h4>
              <p>${ep.desc}</p>
              <div class="ep-info">${ep.info}</div>
            </div>`;
          div.onclick = () => {
            document.querySelectorAll(".ep-item").forEach(e => e.classList.remove("active"));
            div.classList.add("active");
            loadDetail(ep.link, ep.title);
          };
          epList.appendChild(div);
        });
      } else {
        epWrap.style.display = "none";
      }

    } catch (e) {
      setStatus("Error de conexión: " + e.message);
    }
  }

  function loadPlayer(url) {
    const wrap = document.getElementById("player-wrap");
    document.getElementById("player").src = url;
    wrap.style.display = "block";
    wrap.scrollIntoView({ behavior: "smooth" });
  }

  function goBack() {
    document.getElementById("detail").style.display = "none";
    document.getElementById("results").style.display = "flex";
    document.getElementById("player").src = "";
    setStatus("");
  }
</script>

</body>
</html>
